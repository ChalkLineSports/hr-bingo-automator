name: HR Derby Slack Trigger

on:
  schedule:
    # Runs every 5 minutes — checks Slack for !run hr-derby and fires if found
    - cron: '*/5 * * * *'
    # 9 AM CT (14:00 UTC) on Sundays and Wednesdays — post yesterday's results
    - cron: '0 14 * * 0,3'
  workflow_dispatch:
    # Also allows manual triggering from the GitHub Actions UI

permissions:
  contents: write  # needed to commit the generated CSV back to the repo

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on the 5-minute cron or manual dispatch, but NOT on the results cron
    if: github.event.schedule != '0 14 * * 0,3'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for trigger and run HR Derby job
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          OPTICODDS_API_KEY: ${{ secrets.OPTICODDS_API_KEY }}
        run: python hr_derby_runner.py

      # Commit the generated CSV so tomorrow's run can use it for results posting
      - name: Commit generated CSV (if any)
        run: |
          git config user.name "HR Derby Bot"
          git config user.email "hr-derby-bot@users.noreply.github.com"
          git add "HR Derby MLB "*.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: HR Derby CSV $(date -u +%Y-%m-%d)"
          git push || true

  post-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run on the results cron or manual dispatch
    if: github.event.schedule == '0 14 * * 0,3' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post yesterday's HR Derby results
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python hr_derby_runner.py --results-only
